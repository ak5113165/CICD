services:
  backend:
    build: ./api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017/mern-blog}
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
